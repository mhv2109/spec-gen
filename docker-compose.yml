services:
  embedding-server:
    build:
      context: ./docker/embedding-server
      dockerfile: Dockerfile
      args:
        MODEL_NAME: all-MiniLM-L6-v2
    image: spec-gen-embedding:latest
    container_name: spec-gen-embedding
    platform: linux/amd64
    ports:
      - "8765:8765"
    environment:
      MODEL_NAME: all-MiniLM-L6-v2
      PORT: "8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8765/health')"]
      interval: 10s
      timeout: 5s
      start_period: 20s
      retries: 3
